spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:mysql://localhost:3308/chat_service?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul
    username: chat_service_user
    password: chat_service_user
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: aca534b3d9bd0cc9f633ce064c8453ef

            scope:
              - profile_nickname
              - account_email
              - name
              - birthday
              - gender
              - phone_number
              - age_range
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Kakao
            authorization-grant-type: authorization_code
            client-authentication-method: none

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

logging:
  level:
    org.springframework.security: DEBUG